<ng-container *transloco="let t; prefix:'change-license-email'">

  <div class="modal-header align-items-start">
    <div class="d-flex align-items-start gap-3">
      <div class="screen-icon screen-icon--info flex-shrink-0">
        <i class="fa-solid fa-at" aria-hidden="true"></i>
      </div>
      <div>
        <h4 class="modal-title mb-1">{{t('title')}}</h4>
        <p class="screen-subtitle mb-0">{{t('subtitle')}}</p>
      </div>
    </div>
    <button type="button" class="btn-close" [attr.aria-label]="t('close')" (click)="dismiss.emit()"></button>
  </div>

  <form [formGroup]="form" (ngSubmit)="sendCode()">
    <div class="modal-body d-flex flex-column gap-3">

      <section>
        <div class="section-label mb-2">{{t('current-email-label')}}</div>
        <div class="email-row d-flex align-items-center gap-3">
          <i class="fa-solid fa-envelope flex-shrink-0" aria-hidden="true"></i>
          <span class="email-address flex-fill text-truncate">{{licenseInfo()?.registeredEmail}}</span>
          <span class="on-file-pill flex-shrink-0">{{t('on-file-label')}}</span>
        </div>
      </section>

      <section>
        <label class="form-label" for="new-email">{{t('new-email-label')}}</label>
        <input id="new-email" type="email" class="form-control" formControlName="newEmail"
               [placeholder]="t('new-email-placeholder')"
               [class.is-invalid]="form.controls.newEmail.invalid && form.controls.newEmail.touched" />
      </section>

      <p class="confirm-help d-flex align-items-start gap-2 m-0">
        <i class="fa-solid fa-shield-halved flex-shrink-0" aria-hidden="true"></i>
        <span>{{t('confirm-help')}}</span>
      </p>

    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-outline-secondary me-2" (click)="back.emit()">
        <i class="fa-solid fa-chevron-left me-1" aria-hidden="true"></i>
        {{t('back-label')}}
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        <i class="fa-solid fa-paper-plane me-1" aria-hidden="true"></i>
        {{t('send-code-label')}}
      </button>
    </div>
  </form>

</ng-container>
